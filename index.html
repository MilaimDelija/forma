<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORMA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0C0E;--sf:#131316;--s2:#1A1A1F;--s3:#222228;
  --bd:#2A2A32;--bd2:#383840;
  --gold:#C9A84C;--gd:#7A6030;--gg:rgba(201,168,76,.08);
  --tx:#F0EEE8;--t2:#9A9890;--t3:#5C5A55;
  --teal:#3ABFAA;--red:#E06060;
  --paper:#FDFCF8;--p2:#EDEBE3;--ink:#1A1916;--ik2:#4A4845;--ik3:#9A9890;
}

html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;overflow:hidden}

/* ── APP LAYOUT ── */
#app{
  display:grid;
  grid-template-rows:44px auto 1fr;
  height:100vh;
  overflow:hidden;
}
/* Main: sidebar-left | editor | sidebar-right */
/* Sidebars collapse via JS by toggling .hide class */
#main{
  display:grid;
  grid-template-columns:var(--lw,188px) 1fr var(--rw,306px);
  height:100%;
  overflow:hidden;
  transition:grid-template-columns .2s;
}
#main.hide-left{ --lw:0px }
#main.hide-right{ --rw:0px }
#docsbar{ overflow:hidden; transition:all .2s; }
#aip{ overflow:hidden; transition:all .2s; }
#main.hide-left #docsbar{ width:0; border:none; }
#main.hide-right #aip{ width:0; border:none; }

/* ── TOPBAR ── */
#top{
  display:flex;align-items:center;gap:4px;
  border-bottom:1px solid var(--bd);
  background:var(--sf);padding:0 10px;flex-shrink:0;
}
.logo{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;letter-spacing:.08em;color:var(--gold);flex-shrink:0;user-select:none}
.vsep{width:1px;height:15px;background:var(--bd);flex-shrink:0;margin:0 2px}
#dtitle{background:none;border:none;outline:none;font-size:13px;color:var(--tx);padding:3px 6px;border-radius:3px;flex:1;min-width:80px;max-width:200px}
#dtitle:focus{background:var(--s2)}
.ttb{background:none;border:none;cursor:pointer;font-size:11px;color:var(--t2);padding:3px 7px;border-radius:3px;white-space:nowrap;font-family:inherit;transition:background .1s,color .1s}
.ttb:hover{background:var(--s3);color:var(--tx)}
.ttb.gold{background:var(--gg);color:var(--gold);border:1px solid var(--gd)}
.ttb.rec{color:var(--red)!important;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
/* toggle sidebar buttons */
.tog{background:none;border:1px solid var(--bd);border-radius:3px;cursor:pointer;font-size:12px;color:var(--t3);padding:2px 6px;line-height:1;transition:all .15s}
.tog:hover{border-color:var(--gold);color:var(--gold)}
.ml{margin-left:auto}
#slbl{font-size:10px;color:var(--t3);flex-shrink:0}
/* stage badge */
#stage-btn{background:none;border:1px solid var(--bd2);border-radius:12px;cursor:pointer;font-size:11px;padding:2px 9px;font-family:inherit;display:flex;align-items:center;gap:4px;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gobtn{background:var(--gold);color:var(--bg);border:none;cursor:pointer;font-size:12px;font-weight:500;padding:5px 12px;border-radius:3px;font-family:inherit;flex-shrink:0}
.gobtn:hover{opacity:.85}
.gobtn:disabled{opacity:.4;cursor:not-allowed}
/* export */
.xw{position:relative;flex-shrink:0}
.xmenu{position:absolute;top:calc(100%+4px);right:0;background:var(--s2);border:1px solid var(--bd2);border-radius:5px;padding:4px;min-width:130px;z-index:300;display:none;flex-direction:column;gap:2px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
.xmenu.open{display:flex}
.xitem{background:none;border:none;cursor:pointer;font-size:12px;color:var(--t2);padding:6px 10px;border-radius:3px;text-align:left;font-family:inherit}
.xitem:hover{background:var(--s3);color:var(--tx)}

/* ── FORMAT TOOLBAR ── */
#ftbar{background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.ftrow{display:flex;align-items:center;gap:2px;padding:3px 10px;overflow-x:auto;white-space:nowrap}
.ftrow:first-child{border-bottom:1px solid var(--bd)}
.ftrow::-webkit-scrollbar{height:0}
.fb{background:none;border:none;cursor:pointer;font-size:12px;color:var(--t2);padding:3px 6px;border-radius:3px;font-family:inherit;line-height:1.4;flex-shrink:0;white-space:nowrap}
.fb:hover{background:var(--s3);color:var(--tx)}
.fsep{width:1px;height:14px;background:var(--bd);margin:0 2px;flex-shrink:0}
.ftsel{background:var(--s2);border:1px solid var(--bd);border-radius:3px;color:var(--t2);font-size:11px;font-family:inherit;padding:2px 3px;cursor:pointer;outline:none;height:22px;flex-shrink:0}
.ftsel:focus{border-color:var(--gd);color:var(--tx)}
.cwrap{position:relative;flex-shrink:0;display:flex;align-items:center}
.cwrap input[type=color]{position:absolute;opacity:0;inset:0;cursor:pointer;width:100%;height:100%}
/* find bar */
#fbar{display:none;align-items:center;gap:5px;padding:4px 10px;background:var(--s2);border-top:1px solid var(--bd)}
#fbar.open{display:flex}
.finp{background:var(--s3);border:1px solid var(--bd);border-radius:3px;color:var(--tx);font-size:12px;padding:3px 7px;outline:none;width:120px}
.finp:focus{border-color:var(--gd)}
#fcount{font-size:11px;color:var(--t3);min-width:44px}

/* ── DOC SIDEBAR ── */
#docsbar{border-right:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column}
#dbar-top{padding:8px 8px 6px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);flex-shrink:0}
.dlbl{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.newbtn{background:var(--gg);border:1px solid var(--gd);border-radius:3px;cursor:pointer;font-size:11px;color:var(--gold);padding:2px 7px;font-family:inherit}
.newbtn:hover{background:rgba(201,168,76,.16)}
#doc-list{flex:1;overflow-y:auto;padding:4px}
.ditem{display:flex;align-items:center;gap:5px;padding:6px 6px;border-radius:4px;cursor:pointer;margin-bottom:2px;border:1px solid transparent}
.ditem:hover{background:var(--s2)}
.ditem.on{background:var(--gg);border-color:var(--gd)}
.ditem-info{flex:1;min-width:0}
.ditem-title{font-size:12px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ditem.on .ditem-title{color:var(--gold)}
.ditem-meta{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:3px}
.sdot-s{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ddel{background:none;border:none;cursor:pointer;color:var(--t3);font-size:11px;padding:2px;opacity:0;flex-shrink:0}
.ditem:hover .ddel{opacity:1}
.ddel:hover{color:var(--red)}

/* ── EDITOR AREA ── */
/* The grey "desk" around the paper */
#ew{
  background:#5C5855;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:28px 20px 60px;
  height:100%;
}

/* POINT 1: Context bar — same width as paper */
#ctx{
  background:var(--sf);
  border:1px solid var(--bd);
  border-bottom:none;
  width:100%;
  max-width:860px;
  display:flex;align-items:center;gap:6px;
  padding:5px 14px;
  flex-shrink:0;flex-wrap:wrap;
  border-radius:4px 4px 0 0;
}
.clbl{font-size:10px;color:var(--t3);letter-spacing:.04em;flex-shrink:0}
.cinp{background:var(--s2);border:1px solid var(--bd);border-radius:3px;color:var(--t2);font-size:11px;padding:2px 6px;outline:none;font-family:inherit}
.cinp:focus{border-color:var(--gd);color:var(--tx)}

/* ══════════════════════════════
   THE PAGE — key fix:
   Use percentage width + max-width + aspect-ratio-aware min-height
   On any screen size, the page fills available horizontal space
   ══════════════════════════════ */
#paper-wrap{
  width:100%;
  max-width:860px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
}
#paper{
  background:var(--paper);
  width:100%;
  /* A4 ratio: 1:1.414. min-height via aspect-ratio or fallback */
  min-height:calc(100% * 1.414);
  box-shadow:
    0 1px 3px rgba(0,0,0,.12),
    0 4px 20px rgba(0,0,0,.35),
    0 0 0 1px rgba(0,0,0,.15);
  position:relative;
  border-radius:0;
}

/* Published banner */
#pub-banner{display:none;padding:5px 16px;background:rgba(58,191,170,.1);border-bottom:1px solid var(--teal);font-size:11px;color:var(--teal);text-align:center}
#pub-banner.show{display:block}

/* ═══════════════════════════════
   DOCUMENT CONTENT
   Padding scales with viewport
   ═══════════════════════════════ */
#doc{
  outline:none;
  /* Responsive padding: enough margin to look like a document */
  padding:clamp(24px,5vw,72px) clamp(20px,7vw,88px);
  min-height:clamp(600px,calc(100vw * 1.0),1100px);
  caret-color:var(--ink);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:clamp(12px,1.8vw,14px);
  color:var(--ink);
  line-height:1.7;
  /* Ensure text doesn't overflow page */
  word-wrap:break-word;
  overflow-wrap:break-word;
}
#doc:empty::before{content:'Start writing…';color:var(--ik3);pointer-events:none}

/* Typography — scales with font-size */
#doc h1{font-family:'Playfair Display',serif;font-size:2em;font-weight:700;color:var(--ink);line-height:1.2;margin:0 0 .5em}
#doc h2{font-family:'Playfair Display',serif;font-size:1.45em;font-weight:500;color:var(--ink);margin:1.4em 0 .4em}
#doc h3{font-family:'IBM Plex Sans',sans-serif;font-size:.9em;font-weight:600;color:var(--ik2);letter-spacing:.07em;text-transform:uppercase;margin:1.2em 0 .3em}
#doc p{margin-bottom:.6em;min-height:1.7em}
#doc blockquote{border-left:3px solid #B8A06A;padding:.3em 0 .3em 1em;margin:.7em 0;font-style:italic;color:var(--ik2)}
#doc ul,#doc ol{padding-left:1.4em;margin-bottom:.6em}
#doc li{margin-bottom:.15em}
#doc img{max-width:100%;height:auto;display:block;margin:.6em auto}
#doc table.doc-table{width:100%;border-collapse:collapse;margin:.6em 0}
#doc table.doc-table td,
#doc table.doc-table th{border:1px solid #CCC;padding:.3em .5em;min-width:40px;vertical-align:top}
#doc table.doc-table th{background:#F0EDE4;font-weight:500}
.page-break{border:none;border-top:2px dashed #CCC;margin:1em 0;display:block}

/* POINT 2: Semantic margin annotations */
[data-fi]{position:relative}
[data-fi]::before{
  content:'';position:absolute;
  left:calc(-1 * clamp(12px,3vw,22px));
  top:50%;transform:translateY(-50%);
  width:8px;height:8px;border-radius:50%;cursor:help
}
[data-fi=warn]::before{background:rgba(201,168,76,.8)}
[data-fi=err]::before{background:rgba(224,96,96,.8)}
[data-fi=info]::before{background:rgba(58,191,170,.6)}

/* POINT 5: Hash bar */
#hash-bar{
  background:#EDE9DF;border-top:1px solid #C8C4B8;
  padding:4px 14px;display:flex;align-items:center;gap:8px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8A8880;
  flex-shrink:0;flex-wrap:wrap;
}
.hval{color:#3A7A6A;letter-spacing:.04em}

/* ── AI PANEL ── */
#aip{border-left:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column}
#aitabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.aitab{flex:1;background:none;border:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:500;color:var(--t3);padding:9px 2px;letter-spacing:.05em;border-bottom:2px solid transparent;text-transform:uppercase}
.aitab:hover{color:var(--t2)}.aitab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tpane{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}.tpane.on{display:flex}
#tab-chat.on{display:flex;flex-direction:column}
#tab-chat.on #cms{flex:1;overflow-y:auto;min-height:0}
#tab-chat.on #aiw{flex-shrink:0}
#rw{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:10px 11px;animation:fu .2s both}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}.card:nth-child(4){animation-delay:.14s}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.ct{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.bdg{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500}
.bok{background:rgba(58,191,170,.1);color:var(--teal)}.bwn{background:rgba(201,168,76,.15);color:var(--gold)}.ber{background:rgba(224,96,96,.12);color:var(--red)}
.ins{font-size:12px;color:var(--t2);line-height:1.6}
.sg{font-size:12px;color:var(--t2);line-height:1.5;padding:6px 8px;background:var(--s3);border-radius:4px;border-left:2px solid var(--bd2);margin-top:4px;cursor:pointer;transition:border-color .15s,background .15s}
.sg:hover{border-left-color:var(--gold);background:var(--gg);color:var(--tx)}
.sga{font-size:10px;color:var(--t3);margin-top:2px}
.ar{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.al{font-size:11px;color:var(--t2);width:58px;flex-shrink:0;text-transform:capitalize}
.ab{flex:1;height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.af{height:100%;border-radius:2px}
.ap{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace;width:26px;text-align:right;flex-shrink:0}
#cms{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.msg{font-size:12px;line-height:1.6;padding:7px 9px;border-radius:5px;max-width:96%;word-break:break-word}
.mu{background:var(--s3);color:var(--tx);align-self:flex-end;border:1px solid var(--bd2)}
.ma{background:var(--gg);color:var(--t2);align-self:flex-start;border:1px solid var(--gd)}
.dots{display:inline-flex;gap:3px;align-items:center}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--gold);animation:dt .9s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dt{0%,60%,100%{opacity:.2}30%{opacity:1}}
#aiw{flex-shrink:0;padding:8px 10px;border-top:1px solid var(--bd);display:flex !important;gap:6px;align-items:flex-end;background:var(--sf)}
#aii{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:5px 8px;color:var(--tx);font-family:inherit;font-size:12px;outline:none;resize:none;min-height:30px;max-height:86px}
#aii::placeholder{color:var(--t3)}#aii:focus{border-color:var(--gd)}
#aisend{background:var(--gold);border:none;border-radius:4px;cursor:pointer;padding:5px 10px;color:var(--bg);font-size:13px;flex-shrink:0}
#aisend:hover{opacity:.85}#aisend:disabled{opacity:.35;cursor:not-allowed}
.empty-msg{font-size:12px;color:var(--t3);line-height:1.7;padding:20px;text-align:center}
.ldg{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2);padding:10px}
.spin{width:13px;height:13px;border:2px solid var(--bd);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* POINT 5: Provenance panel */
#provwrap{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.pe{display:flex;gap:7px}
.pl{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.pd{width:9px;height:9px;border-radius:50%;background:var(--teal);border:2px solid #1A5A52;flex-shrink:0}
.pd.gen{background:var(--gold);border-color:var(--gd)}
.ps{width:1px;flex:1;background:var(--bd);margin:2px 0;min-height:20px}
.pi{flex:1}
.ph{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--teal);letter-spacing:.04em}
.pm{font-size:11px;color:var(--t2);margin-top:2px}
.pt{font-size:10px;color:var(--t3)}

/* Spreadsheet */
.fsheet{margin:10px 0;border:1.5px solid #B8B4AA;border-radius:4px;overflow:hidden}
.fsheet:focus-within{border-color:#5A9A78}
.fsbar{display:flex;align-items:center;gap:5px;padding:3px 7px;background:#E8E4D8;border-bottom:1px solid #C8C4B8}
.fsname{background:none;border:none;outline:none;font-family:inherit;font-size:10px;font-weight:500;color:var(--ik2);width:110px}
.fsbtns{display:flex;gap:2px;margin-left:auto}
.fsbtn{background:none;border:1px solid #C0BCB0;border-radius:2px;cursor:pointer;font-size:10px;padding:1px 5px;color:var(--ik2);font-family:inherit}
.fsbtn:hover{background:#D8D4C8}
.fsbtn.rm{color:var(--red)}
.fsfb{display:flex;align-items:center;background:#F5F2EA;border-bottom:1px solid #D0CCBC}
.fsref{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ik2);min-width:30px;padding:3px 4px;background:#E0DDD0;border-right:1px solid #C8C4B8;text-align:center;flex-shrink:0}
.fsfx{font-size:10px;color:var(--ik3);padding:0 4px;flex-shrink:0;font-style:italic}
.fsfml{flex:1;background:none;border:none;outline:none;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);padding:3px 4px}
.fsscr{overflow-x:auto}
.fstbl{border-collapse:collapse;table-layout:fixed}
.fstbl th{background:#E8E4D8;border:1px solid #C8C4B8;padding:2px 4px;font-size:10px;font-weight:500;color:var(--ik2);text-align:center;min-width:80px;width:80px;user-select:none;font-family:inherit}
.fstbl th.rh{min-width:24px;width:24px;background:#DEDAD0}
.fstbl td{border:1px solid #D4D0C4;padding:0;background:var(--paper);min-width:80px;width:80px}
.fstbl td.rn{background:#E8E4D8;border-color:#C8C4B8;font-size:10px;color:var(--ik3);text-align:center;padding:2px;user-select:none;width:24px;min-width:24px;font-family:inherit}
.fstbl td.sel{outline:2px solid #4A9A78;outline-offset:-1px;background:#FAFFF8;z-index:2}
.fstbl tr.hr td{background:#F5F2E8}
.fstbl tr.er td{background:#FAFAF5}
.ci{display:block;width:100%;border:none;outline:none;padding:2px 4px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);background:transparent;min-height:20px;text-align:right}
.ci.lft{text-align:left}.ci.fml{color:#1A6A40}.ci.err{color:#B03030}

/* Table picker */
#tpick{position:absolute;background:var(--s2);border:1px solid var(--bd2);border-radius:5px;padding:7px;z-index:300;display:none;box-shadow:0 6px 24px rgba(0,0,0,.5)}
#tpick.open{display:block}
.tpg{display:grid;grid-template-columns:repeat(8,17px);gap:2px}
.tpc{width:17px;height:17px;border:1px solid var(--bd);border-radius:2px;cursor:pointer;background:var(--s3)}
.tpc.hi{background:var(--gold);border-color:var(--gd)}
#tplbl{font-size:10px;color:var(--t3);text-align:center;margin-top:4px}

/* Semantic tooltip */
.ftip{position:fixed;background:var(--s2);border:1px solid var(--bd2);border-radius:5px;padding:8px 12px;font-size:11px;color:var(--t2);max-width:220px;z-index:500;pointer-events:none;display:none;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.ftip.show{display:block}
.ftip strong{color:var(--gold);display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── PRINT ── */
@media print{
  #top,#ftbar,#docsbar,#aip,#ctx,#hash-bar,.ftip{display:none!important}
  #main{grid-template-columns:1fr!important}
  #app{grid-template-rows:0 0 1fr!important}
  #ew{background:#fff!important;padding:0!important;display:block!important}
  #paper-wrap{max-width:100%!important;width:100%!important}
  #paper{box-shadow:none!important;width:100%!important}
  #doc{padding:1.5cm 2cm!important;font-size:11pt!important}
  [data-fi]::before{display:none!important}
  .fsheet{border:1px solid #999!important}
  .fsbar,.fsfb{display:none!important}
}
</style>
</head>
<body>
<div id="app">

<!-- ── TOPBAR ── -->
<header id="top">
  <div class="logo">FORMA</div>
  <div class="vsep"></div>
  <!-- Toggle sidebars -->
  <button class="tog" onclick="toggleSide('left')" title="Toggle documents panel">☰</button>
  <div class="vsep"></div>
  <input id="dtitle" value="Untitled Document" spellcheck="false">
  <div class="vsep"></div>
  <button id="stage-btn" onclick="cycleStage()">
    <span class="sdot" id="sdot" style="background:#9A9890"></span>
    <span id="slbl2">Draft</span>
  </button>
  <div class="vsep"></div>
  <button class="ttb" onmousedown="ep(event)" onclick="doUndo()">↩</button>
  <button class="ttb" onmousedown="ep(event)" onclick="doRedo()">↪</button>
  <div class="vsep"></div>
  <button class="ttb" id="mic-btn" onmousedown="ep(event)" onclick="toggleVoice()">🎤</button>
  <div class="ml"></div>
  <span id="slbl"></span>
  <div class="vsep"></div>
  <div class="xw" id="xw">
    <button class="ttb" onclick="toggleX()">Export ↓</button>
    <div class="xmenu" id="xmenu">
      <button class="xitem" onclick="xPDF()">📄 PDF</button>
      <button class="xitem" onclick="xDOCX()">📝 DOCX</button>
    </div>
  </div>
  <div class="vsep"></div>
  <button class="gobtn" id="abtn" onclick="analyseDoc()">✦ Analyse</button>
  <div class="vsep"></div>
  <button class="tog" onclick="toggleSide('right')" title="Toggle AI panel">⟩</button>
</header>

<!-- ── FORMAT TOOLBAR ── -->
<div id="ftbar">
  <!-- ROW 1: Character -->
  <div class="ftrow">
    <select class="ftsel" id="fsel" style="width:126px" onmousedown="saveSel()" onchange="applyFont(this.value)">
      <option value="'IBM Plex Sans',sans-serif">IBM Plex Sans</option>
      <option value="'Playfair Display',serif">Playfair Display</option>
      <option value="'Merriweather',serif">Merriweather</option>
      <option value="'Lato',sans-serif">Lato</option>
      <option value="Georgia,serif">Georgia</option>
      <option value="'Times New Roman',serif">Times New Roman</option>
      <option value="Arial,sans-serif">Arial</option>
      <option value="'Courier New',monospace">Courier New</option>
    </select>
    <select class="ftsel" id="ssel" style="width:50px" onmousedown="saveSel()" onchange="applySize(this.value)">
      <option>8</option><option>9</option><option>10</option><option>11</option>
      <option selected>12</option><option>14</option><option>16</option><option>18</option>
      <option>20</option><option>24</option><option>28</option><option>32</option>
      <option>36</option><option>48</option><option>72</option>
    </select>
    <div class="fsep"></div>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('bold')"><b>B</b></button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('italic')"><i>I</i></button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('underline')"><u>U</u></button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('strikeThrough')"><s>S</s></button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('superscript')">x²</button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('subscript')">x₂</button>
    <div class="fsep"></div>
    <div class="cwrap" title="Text color">
      <button class="fb" onmousedown="ep(event)">A<span id="cbar" style="display:block;height:2px;background:#1A1916;border-radius:1px;margin-top:1px"></span></button>
      <input type="color" id="tcol" value="#1A1916" onmousedown="saveSel()" onchange="applyColor(this.value)">
    </div>
    <div class="cwrap" title="Highlight">
      <button class="fb" onmousedown="ep(event)">H<span id="hbar" style="display:block;height:2px;background:#FFE066;border-radius:1px;margin-top:1px"></span></button>
      <input type="color" id="hcol" value="#FFE066" onmousedown="saveSel()" onchange="applyHL(this.value)">
    </div>
    <div class="fsep"></div>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('justifyLeft')" title="Left">≡L</button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('justifyCenter')" title="Center">≡C</button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('justifyRight')" title="Right">≡R</button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('justifyFull')" title="Justify">≡J</button>
    <div class="fsep"></div>
    <select class="ftsel" style="width:50px" title="Line spacing" onmousedown="saveSel()" onchange="applyLS(this.value)">
      <option value="1">1.0</option><option value="1.15">1.15</option>
      <option value="1.5" selected>1.5</option><option value="2">2.0</option>
      <option value="2.5">2.5</option><option value="3">3.0</option>
    </select>
  </div>
  <!-- ROW 2: Paragraph / Insert -->
  <div class="ftrow">
    <button class="fb" onmousedown="ep(event)" onclick="setBlk('h1')">H1</button>
    <button class="fb" onmousedown="ep(event)" onclick="setBlk('h2')">H2</button>
    <button class="fb" onmousedown="ep(event)" onclick="setBlk('h3')">H3</button>
    <button class="fb" onmousedown="ep(event)" onclick="setBlk('p')">¶</button>
    <button class="fb" onmousedown="ep(event)" onclick="setBlk('blockquote')">" Quote</button>
    <div class="fsep"></div>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('insertUnorderedList')">• List</button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('insertOrderedList')">1. List</button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('indent')">→</button>
    <button class="fb" onmousedown="ep(event)" onclick="cmd('outdent')">←</button>
    <div class="fsep"></div>
    <div style="position:relative">
      <button class="fb" onmousedown="ep(event)" onclick="toggleTP()">⊞ Table</button>
      <div id="tpick"><div class="tpg" id="tpg"></div><div id="tplbl">0 × 0</div></div>
    </div>
    <button class="fb" onmousedown="ep(event)" onclick="trigImg()">📷 Image</button>
    <button class="fb" onmousedown="ep(event)" onclick="insSheet()">⊡ Sheet</button>
    <button class="fb" onmousedown="ep(event)" onclick="insPBrk()">⋯ Break</button>
    <div class="fsep"></div>
    <button class="fb" onclick="toggleFind()">🔍 Find</button>
  </div>
  <!-- Find bar -->
  <div id="fbar">
    <input class="finp" id="fin" placeholder="Find…" oninput="doFind()">
    <input class="finp" id="rin" placeholder="Replace with…">
    <button class="fb" onmousedown="ep(event)" onclick="fPrev()">↑</button>
    <button class="fb" onmousedown="ep(event)" onclick="fNext()">↓</button>
    <button class="fb" onmousedown="ep(event)" onclick="doRepl()">Replace</button>
    <button class="fb" onmousedown="ep(event)" onclick="doReplAll()">All</button>
    <span id="fcount"></span>
    <button class="fb" onclick="toggleFind()" style="margin-left:auto">✕</button>
  </div>
</div>

<input type="file" id="ifile" accept="image/*" style="display:none" onchange="onImgF(this)">

<div id="main">

  <!-- DOC SIDEBAR -->
  <aside id="docsbar">
    <div id="dbar-top">
      <span class="dlbl">Documents</span>
      <button class="newbtn" onclick="newDoc()">+ New</button>
    </div>
    <div id="doc-list"></div>
  </aside>

  <!-- EDITOR -->
  <div id="ew">
    <!-- POINT 1: Context -->
    <div id="ctx">
      <span class="clbl">PROJECT</span>
      <input class="cinp" id="cproj" placeholder="Project…" style="width:110px" oninput="saveCtx()">
      <span class="clbl" style="margin-left:4px">AUDIENCE</span>
      <select class="cinp" id="caud" onchange="saveCtx()" style="width:100px">
        <option>General</option><option>Academic</option><option>Investor</option>
        <option>Legal</option><option>Editorial</option><option>Municipal</option>
      </select>
      <span class="clbl" style="margin-left:4px">PURPOSE</span>
      <input class="cinp" id="cpurp" placeholder="Purpose…" style="flex:1;min-width:80px" oninput="saveCtx()">
    </div>

    <div id="paper-wrap">
      <div id="paper">
        <div id="pub-banner">
          ✓ Published — document locked.
          <button onclick="unlockDoc()" style="background:none;border:none;cursor:pointer;color:var(--teal);text-decoration:underline;font-family:inherit;font-size:11px;margin-left:8px">Unlock</button>
        </div>
        <div id="doc" contenteditable="true" spellcheck="true"></div>
        <!-- POINT 5: Hash bar -->
        <div id="hash-bar">
          <span>SHA-256</span>
          <span class="hval" id="chash">—</span>
          <span id="clen" style="margin-left:8px">0 versions</span>
          <button onclick="saveWithHash('Manual save')" style="background:none;border:1px solid #B8B4AA;border-radius:3px;cursor:pointer;font-size:9px;padding:1px 6px;color:#7A7870;font-family:inherit;margin-left:8px">⛓ Save version</button>
          <span id="cverify" style="margin-left:auto"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- AI PANEL -->
  <aside id="aip">
    <div id="aitabs">
      <button class="aitab on" data-tab="analysis">Analysis</button>
      <button class="aitab" data-tab="chat">Chat</button>
      <button class="aitab" data-tab="prov">Provenance</button>
    </div>
    <div class="tpane on" id="tab-analysis">
      <div id="rw"><div class="empty-msg">Write your document,<br>then click <strong style="color:var(--gold)">✦ Analyse</strong></div></div>
    </div>
    <div class="tpane" id="tab-chat">
      <div id="cms"><div class="msg ma">Ask me anything about your document.</div></div>
      <div id="aiw">
        <textarea id="aii" placeholder="Ask…" rows="1"></textarea>
        <button id="aisend" onclick="sendChat()">↑</button>
      </div>
    </div>
    <div class="tpane" id="tab-prov">
      <div id="provwrap"><div class="empty-msg">Save your document to create the provenance chain.</div></div>
    </div>
  </aside>
</div>

<!-- Semantic tooltip -->
<div class="ftip" id="ftip"><strong id="ftit"></strong><span id="fbod"></span></div>

</div>
<script>
'use strict';

// ══════════════════════════════════════
// SAVED SELECTION — fixes font/size/color on selects
// ══════════════════════════════════════
let savedSel = null;
document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  try {
    const r = sel.getRangeAt(0);
    if (docEl.contains(r.commonAncestorContainer)) savedSel = r.cloneRange();
  } catch(e){}
});
function saveSel() {
  const sel = window.getSelection();
  if (sel && sel.rangeCount) try { savedSel = sel.getRangeAt(0).cloneRange(); } catch(e){}
}
function restoreSel() {
  if (!savedSel) return;
  try { docEl.focus(); const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(savedSel); } catch(e){}
}
function ep(ev) { ev.preventDefault(); }

// ══════════════════════════════════════
// SIDEBAR TOGGLE
// ══════════════════════════════════════
function toggleSide(side) {
  const main = document.getElementById('main');
  if (side === 'left')  main.classList.toggle('hide-left');
  if (side === 'right') main.classList.toggle('hide-right');
}

// ══════════════════════════════════════
// FORMAT COMMANDS
// ══════════════════════════════════════
const docEl = document.getElementById('doc');

function cmd(c) { docEl.focus(); document.execCommand('styleWithCSS',false,true); document.execCommand(c,false,null); }
function applyFont(val) { restoreSel(); document.execCommand('styleWithCSS',false,true); document.execCommand('fontName',false,val); docEl.focus(); }
function applySize(pt) {
  restoreSel();
  const sel=window.getSelection(); if(!sel||!sel.rangeCount||sel.isCollapsed){docEl.focus();return;}
  try {
    const range=sel.getRangeAt(0); const span=document.createElement('span'); span.style.fontSize=pt+'pt';
    range.surroundContents(span);
    const r=document.createRange();r.setStartAfter(span);r.collapse(true);sel.removeAllRanges();sel.addRange(r);
  } catch(e) { document.execCommand('styleWithCSS',false,true); document.execCommand('fontSize',false,pt>=36?'7':pt>=24?'6':pt>=18?'5':pt>=14?'4':pt>=12?'3':'2'); }
  docEl.focus();
}
function applyColor(val) { document.getElementById('cbar').style.background=val; restoreSel(); document.execCommand('styleWithCSS',false,true); document.execCommand('foreColor',false,val); docEl.focus(); }
function applyHL(val) { document.getElementById('hbar').style.background=val; restoreSel(); document.execCommand('styleWithCSS',false,true); document.execCommand('hiliteColor',false,val); docEl.focus(); }
function applyLS(val) {
  restoreSel(); const sel=window.getSelection(); if(!sel||!sel.rangeCount)return;
  let n=sel.getRangeAt(0).commonAncestorContainer; if(n.nodeType===3)n=n.parentNode;
  const b=n.closest('p,h1,h2,h3,blockquote,li,div')||n; if(b&&docEl.contains(b))b.style.lineHeight=val; docEl.focus();
}
function setBlk(tag) {
  docEl.focus(); const sel=window.getSelection(); if(!sel||!sel.rangeCount)return;
  let n=sel.getRangeAt(0).commonAncestorContainer; if(n.nodeType===3)n=n.parentNode;
  while(n&&n.parentNode!==docEl)n=n.parentNode;
  if(!n||n===docEl){document.execCommand('formatBlock',false,'<'+tag+'>');return;}
  const el=document.createElement(tag); el.innerHTML=n.innerHTML||'<br>'; n.replaceWith(el);
  const r=document.createRange();r.selectNodeContents(el);r.collapse(false);sel.removeAllRanges();sel.addRange(r);onInput();
}
function doUndo(){docEl.focus();document.execCommand('undo');}
function doRedo(){docEl.focus();document.execCommand('redo');}

// ══════════════════════════════════════
// IMAGE
// ══════════════════════════════════════
function trigImg(){document.getElementById('ifile').click();}
function onImgF(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>insImg(e.target.result);r.readAsDataURL(f);inp.value='';}
function insImg(src){
  docEl.focus();const img=document.createElement('img');img.src=src;img.style.maxWidth='100%';
  const sel=window.getSelection();
  if(sel&&sel.rangeCount){const r=sel.getRangeAt(0);r.deleteContents();r.insertNode(img);r.setStartAfter(img);r.collapse(true);sel.removeAllRanges();sel.addRange(r);}
  else docEl.appendChild(img);onInput();
}
docEl.addEventListener('dragover',ev=>{if(ev.dataTransfer.types.includes('Files'))ev.preventDefault();});
docEl.addEventListener('drop',ev=>{const f=ev.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){ev.preventDefault();const r=new FileReader();r.onload=e=>insImg(e.target.result);r.readAsDataURL(f);}});
docEl.addEventListener('paste',ev=>{for(const it of ev.clipboardData.items){if(it.type.startsWith('image/')){ev.preventDefault();const f=it.getAsFile();const r=new FileReader();r.onload=e=>insImg(e.target.result);r.readAsDataURL(f);break;}}});

// ══════════════════════════════════════
// TEXT TABLE
// ══════════════════════════════════════
function buildTPG(){const g=document.getElementById('tpg');g.innerHTML='';for(let r=0;r<8;r++)for(let c=0;c<8;c++){const d=document.createElement('div');d.className='tpc';d.dataset.r=r+1;d.dataset.c=c+1;d.addEventListener('mouseenter',()=>hlTP(r+1,c+1));d.addEventListener('click',()=>{insTbl(r+1,c+1);closeTP();});g.appendChild(d);}}
function hlTP(r,c){document.querySelectorAll('.tpc').forEach(t=>t.classList.toggle('hi',+t.dataset.r<=r&&+t.dataset.c<=c));document.getElementById('tplbl').textContent=r+' × '+c;}
function toggleTP(){document.getElementById('tpick').classList.toggle('open');}
function closeTP(){document.getElementById('tpick').classList.remove('open');}
document.addEventListener('click',ev=>{if(!ev.target.closest('#tpick')&&!ev.target.textContent.includes('⊞'))closeTP();});
function insTbl(rows,cols){rows=rows||3;cols=cols||3;const t=document.createElement('table');t.className='doc-table';const thead=t.createTHead();const hr=thead.insertRow();for(let c=0;c<cols;c++){const th=document.createElement('th');th.contentEditable='true';th.innerHTML='<br>';hr.appendChild(th);}const tbody=t.createTBody();for(let r=0;r<rows-1;r++){const tr=tbody.insertRow();for(let c=0;c<cols;c++){const td=tr.insertCell();td.contentEditable='true';td.innerHTML='<br>';}}docEl.focus();const sel=window.getSelection();if(sel&&sel.rangeCount){const r=sel.getRangeAt(0);r.collapse(false);r.insertNode(t);r.setStartAfter(t);r.collapse(true);sel.removeAllRanges();sel.addRange(r);}else docEl.appendChild(t);const p=document.createElement('p');p.innerHTML='<br>';t.insertAdjacentElement('afterend',p);onInput();}
function insPBrk(){docEl.focus();const hr=document.createElement('hr');hr.className='page-break';const sel=window.getSelection();if(sel&&sel.rangeCount){const r=sel.getRangeAt(0);r.deleteContents();r.insertNode(hr);const p=document.createElement('p');p.innerHTML='<br>';hr.insertAdjacentElement('afterend',p);const rr=document.createRange();rr.setStart(p,0);rr.collapse(true);sel.removeAllRanges();sel.addRange(rr);}else docEl.appendChild(hr);onInput();}

// ══════════════════════════════════════
// FIND & REPLACE
// ══════════════════════════════════════
let fm=[],fi=0;
function toggleFind(){const f=document.getElementById('fbar');f.classList.toggle('open');if(f.classList.contains('open'))document.getElementById('fin').focus();else clrHL();}
function doFind(){clrHL();const t=document.getElementById('fin').value;if(!t){document.getElementById('fcount').textContent='';return;}fm=[];fi=0;docEl.innerHTML=docEl.innerHTML.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark class="fnd">${m}</mark>`);fm=Array.from(docEl.querySelectorAll('mark.fnd'));document.getElementById('fcount').textContent=fm.length+' found';if(fm.length)scrM(0);}
function scrM(i){if(!fm.length)return;fm.forEach(m=>m.style.background='#FFE066');fi=((i%fm.length)+fm.length)%fm.length;fm[fi].style.background='#FFA500';fm[fi].scrollIntoView({block:'nearest'});document.getElementById('fcount').textContent=(fi+1)+'/'+fm.length;}
function fNext(){scrM(fi+1);}function fPrev(){scrM(fi-1);}
function clrHL(){docEl.querySelectorAll('mark.fnd').forEach(m=>m.replaceWith(document.createTextNode(m.textContent)));fm=[];}
function doRepl(){const t=document.getElementById('fin').value,r=document.getElementById('rin').value;if(!t||!fm.length)return;const m=fm[fi];if(m){m.replaceWith(document.createTextNode(r));fm.splice(fi,1);}document.getElementById('fcount').textContent=fm.length+' found';if(fm.length)scrM(fi%fm.length);}
function doReplAll(){const t=document.getElementById('fin').value,r=document.getElementById('rin').value;if(!t)return;clrHL();docEl.innerHTML=docEl.innerHTML.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),r);document.getElementById('fcount').textContent='Replaced all';onInput();}
document.addEventListener('keydown',ev=>{if(ev.ctrlKey&&ev.key==='f'){ev.preventDefault();toggleFind();}if(ev.key==='Escape'){const f=document.getElementById('fbar');if(f.classList.contains('open')){f.classList.remove('open');clrHL();}}});

// ══════════════════════════════════════
// POINT 1: CONTEXT
// ══════════════════════════════════════
let ctx={project:'',audience:'General',purpose:''};
function saveCtx(){ctx.project=document.getElementById('cproj').value;ctx.audience=document.getElementById('caud').value;ctx.purpose=document.getElementById('cpurp').value;}
function loadCtx(c){if(!c)return;ctx=c;document.getElementById('cproj').value=c.project||'';document.getElementById('caud').value=c.audience||'General';document.getElementById('cpurp').value=c.purpose||'';}
function sysP(extra){return `You are FORMA, intelligent document assistant.\nProject: "${ctx.project||'—'}", Audience: "${ctx.audience}", Purpose: "${ctx.purpose||'—'}", Stage: "${stage}".\n${extra||''}`;}

// ══════════════════════════════════════
// POINT 3: WORKFLOW STAGES
// ══════════════════════════════════════
const STAGES=['Draft','Review','Published'],SCOLS={Draft:'#9A9890',Review:'#C9A84C',Published:'#3ABFAA'};
let stage='Draft';
function cycleStage(){const next=STAGES[(STAGES.indexOf(stage)+1)%STAGES.length];if(next==='Published'){if(!confirm('Publish and lock this document?'))return;publishDoc();return;}stage=next;updateStageUI();saveDoc();}
function updateStageUI(){document.getElementById('slbl2').textContent=stage;document.getElementById('sdot').style.background=SCOLS[stage];const locked=stage==='Published';docEl.contentEditable=locked?'false':'true';document.getElementById('pub-banner').classList.toggle('show',locked);}
async function publishDoc(){stage='Published';updateStageUI();await saveWithHash('Published');saveDoc();}
function unlockDoc(){stage='Draft';updateStageUI();}

// ══════════════════════════════════════
// POINT 4: VOICE
// ══════════════════════════════════════
let recog=null,isRec=false;
function toggleVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice input requires Chrome or Edge.');return;}
  if(isRec){stopVoice();return;}
  recog=new SR();recog.continuous=true;recog.interimResults=false;recog.lang='en-US';
  recog.onresult=ev=>{for(let i=ev.resultIndex;i<ev.results.length;i++)if(ev.results[i].isFinal)insVoice(ev.results[i][0].transcript);};
  recog.onerror=()=>stopVoice();
  recog.onend=()=>{if(isRec)recog.start();};
  recog.start();isRec=true;
  document.getElementById('mic-btn').classList.add('rec');document.getElementById('mic-btn').textContent='⏹';
}
function stopVoice(){if(recog){recog.onend=null;recog.stop();recog=null;}isRec=false;document.getElementById('mic-btn').classList.remove('rec');document.getElementById('mic-btn').textContent='🎤';}
function insVoice(text){
  docEl.focus();const sel=window.getSelection();
  if(sel&&sel.rangeCount){const r=sel.getRangeAt(0);r.deleteContents();const n=document.createTextNode(text+' ');r.insertNode(n);r.setStartAfter(n);r.collapse(true);sel.removeAllRanges();sel.addRange(r);}
  else{let p=docEl.querySelector('p:last-child')||docEl;p.textContent+=text+' ';}
  onInput();
}

// ══════════════════════════════════════
// POINT 5: SHA-256 PROVENANCE
// ══════════════════════════════════════
let chain=[];
function updateHashUI(){
  if(chain.length){
    const l=chain[chain.length-1];
    document.getElementById('chash').textContent=l.hash.slice(0,10)+'…'+l.hash.slice(-6);
    document.getElementById('clen').textContent=chain.length+' version'+(chain.length!==1?'s':'');
  } else {
    document.getElementById('chash').textContent='—';
    document.getElementById('clen').textContent='0 versions';
  }
}
async function sha256(txt){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(txt));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function saveWithHash(msg){

}

function annotate(a){
  docEl.querySelectorAll('[data-fi]').forEach(el=>{el.removeAttribute('data-fi');el.removeAttribute('data-fm');});
  const blocks=Array.from(docEl.querySelectorAll('p,h1,h2,h3,blockquote,li')).filter(b=>b.innerText.trim().length>20);
  if(!blocks.length||!a)return;
  const mark=(type,msg)=>{const n=Math.floor(Math.random()*blocks.length);blocks[n].setAttribute('data-fi',type);blocks[n].setAttribute('data-fm',msg);};
  if(a.contradictions?.length)mark('err','Contradiction: '+a.contradictions[0]);
  if(a.claims_without_evidence?.length)mark('warn','Unsupported: '+a.claims_without_evidence[0]);
  if(a.gaps?.length)mark('info','Gap: '+a.gaps[0]);
  const tt=document.getElementById('ftip');
  docEl.querySelectorAll('[data-fi]').forEach(el=>{

  });
}

, all visible at once.</p><h2>Authorship that cannot be disputed</h2><p>Every time you save in FORMA, the document receives a cryptographic fingerprint — a hash built from the content and the hash before it, going all the way back to the first word. You cannot change a sentence without changing the record. For a researcher whose work gets appropriated, for a journalist whose story gets disputed, for a lawyer whose draft gets altered — this chain of proof changes what a document can do in the world.</p><blockquote>"A document is not a text. It is an argument with structure, provenance, and audience — none of which text alone can carry."</blockquote><p>FORMA is where that argument lives.</p>`;

function gR(ref,data){const m=ref.trim().toUpperCase().match(/^([A-Z]+)(\d+)$/);if(!m)return 0;const c=m[1].charCodeAt(0)-65,r=parseInt(m[2])-1;const v=data[r]?.[c]??'';return String(v).startsWith('=')?+evC(v,data)||0:+v||0;}
function rng(arg,data){arg=arg.trim();if(!arg.includes(':'))return[gR(arg,data)];const[a,b]=arg.split(':').map(x=>x.trim().toUpperCase().match(/^([A-Z]+)(\d+)$/));if(!a||!b)return[];const r1=parseInt(a[2])-1,c1=a[1].charCodeAt(0)-65,r2=parseInt(b[2])-1,c2=b[1].charCodeAt(0)-65;const out=[];for(let r=Math.min(r1,r2);r<=Math.max(r1,r2);r++)for(let c=Math.min(c1,c2);c<=Math.max(c1,c2);c++){const v=data[r]?.[c]??'';out.push(String(v).startsWith('=')?+evC(v,data)||0:+v||0);}return out;}
function evC(raw,data){if(!raw||!String(raw).startsWith('='))return raw;let ex=raw.slice(1);const F=(n,fn)=>{ex=ex.replace(new RegExp(n+'\\(([^)]+)\\)','gi'),(_,a)=>{const v=rng(a,data);return v.length?fn(v):0;});};F('SUM',v=>v.reduce((s,x)=>s+x,0));F('AVERAGE',v=>v.reduce((s,x)=>s+x,0)/v.length);F('AVG',v=>v.reduce((s,x)=>s+x,0)/v.length);F('MIN',v=>Math.min(...v));F('MAX',v=>Math.max(...v));F('COUNT',v=>v.length);F('ROUND',v=>Math.round(v[0]*Math.pow(10,v[1]||0))/Math.pow(10,v[1]||0));ex=ex.replace(/IF\(([^,]+),([^,]+),([^)]+)\)/gi,(_,cond,t,f)=>{try{return Function('"use strict";return !!('+cond+')')() ?t.trim():f.trim();}catch{return '#ERR';}});ex=ex.replace(/\b([A-Z]+)(\d+)\b/gi,(_,c,r)=>gR(c+r,data));try{const res=Function('"use strict";return ('+ex+')')();if(res==null||res!==res)return '#ERR';if(typeof res==='number'){const f=parseFloat(res.toFixed(8));return Number.isInteger(f)?f:parseFloat(f.toFixed(4));}return res;}catch{return '#ERR';}}

async function callAI(msgs,sys){const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs,system:sys})});if(!res.ok){const e=await res.json().catch(()=>{});throw new Error(e?.error||'Server error '+res.status);}return(await res.json()).content;}
async function analyseDoc(){const text=docEl.innerText.trim();if(text.length<40){alert('Write at least a paragraph first.');return;}const btn=document.getElementById('abtn');btn.disabled=true;btn.textContent='Analysing…';document.querySelector('[data-tab="analysis"]').click();document.getElementById('rw').innerHTML='<div class="ldg"><div class="spin"></div><span>Analysing…</span></div>';const sys=sysP('Analyse and return ONLY valid JSON (no markdown):\n{"summary":"","gaps":[],"contradictions":[],"claims_without_evidence":[],"structure_issues":[],"strengths":[],"next_sentence":"","missing_sections":[],"audience_fit":{"academic":0,"investor":0,"general":0}}');try{const raw=await callAI([{role:'user',content:'Analyse:\n\n'+text}],sys);let r;try{r=JSON.parse(raw);}catch{r=JSON.parse(raw.replace(/```json|```/g,'').trim());}renderAnalysis(r);annotate(r);}catch(err){document.getElementById('rw').innerHTML=`<div class="card"><div class="ins" style="color:var(--red)">${err.message}</div></div>`;}btn.disabled=false;btn.textContent='✦ Re-analyse';}
function renderAnalysis(r){const rw=document.getElementById('rw');rw.innerHTML='';const ac=(t,b,h)=>{const d=document.createElement('div');d.className='card';const l={bok:'Good',bwn:'Review',ber:'Fix'}[b];d.innerHTML=`<div class="ch"><span class="ct">${t}</span><span class="bdg ${b}">${l}</span></div>${h}`;rw.appendChild(d);};if(r.summary)ac('Document','bok',`<div class="ins">${r.summary}</div>`);if(r.next_sentence)ac('Continue','bok',`<div class="ins" style="font-style:italic;color:var(--t3);margin-bottom:5px">"…${r.next_sentence}"</div><div class="sg" onclick="insLine(this,'${r.next_sentence.replace(/'/g,"\\'")}')">Insert sentence<div class="sga">↗ Append</div></div>`);if(r.gaps?.length)ac(`Gaps (${r.gaps.length})`,'bwn',r.gaps.map(g=>`<div class="sg">${g}</div>`).join(''));if(r.contradictions?.length)ac(`Contradictions (${r.contradictions.length})`,'ber',r.contradictions.map(c=>`<div class="sg" style="border-left-color:var(--red)">${c}</div>`).join(''));if(r.claims_without_evidence?.length)ac(`Unsupported (${r.claims_without_evidence.length})`,'bwn',r.claims_without_evidence.map(c=>`<div class="sg">${c}</div>`).join(''));if(r.missing_sections?.length)ac('Missing Sections','bwn',r.missing_sections.map(s=>`<div class="sg" onclick="genSec('${s.replace(/'/g,"\\'")}',this)">Add: <strong>${s}</strong><div class="sga">↗ Generate</div></div>`).join(''));if(r.strengths?.length)ac('Strengths','bok',r.strengths.map(s=>`<div class="ins" style="padding:3px 0;border-bottom:1px solid var(--bd)">✓ ${s}</div>`).join(''));if(r.audience_fit)ac('Audience Fit','bok',Object.entries(r.audience_fit).map(([k,v])=>`<div class="ar"><div class="al">${k}</div><div class="ab"><div class="af" style="width:${v}%;background:${v>70?'var(--teal)':v>45?'var(--gold)':'var(--red)'}"></div></div><div class="ap">${v}%</div></div>`).join(''));}
function insLine(el,text){const p=document.createElement('p');p.textContent=text;docEl.appendChild(p);el.querySelector('.sga').textContent='✓ Inserted';}
async function genSec(sec,el){const a=el.querySelector('.sga');a.textContent='Generating…';try{const h=await callAI([{role:'user',content:`Doc:\n\n${docEl.innerText.trim()}\n\nWrite section "${sec}". Only <h2>+<p> HTML.`}],sysP('Return HTML only.'));const d=document.createElement('div');d.innerHTML=h.replace(/```[a-z]*/g,'').trim();docEl.appendChild(d);a.textContent='✓ Added';a.style.color='var(--teal)';}catch(err){a.textContent='Error: '+err.message;a.style.color='var(--red)';}}
let chatH=[];
const aiiEl=document.getElementById('aii');
aiiEl.addEventListener('input',()=>{aiiEl.style.height='auto';aiiEl.style.height=Math.min(aiiEl.scrollHeight,86)+'px';});
aiiEl.addEventListener('keydown',ev=>{if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();sendChat();}});
async function sendChat(){const q=aiiEl.value.trim();if(!q)return;aiiEl.value='';aiiEl.style.height='auto';document.getElementById('aisend').disabled=true;const ms=document.getElementById('cms');const um=document.createElement('div');um.className='msg mu';um.textContent=q;ms.appendChild(um);const tp=document.createElement('div');tp.className='msg ma';tp.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';ms.appendChild(tp);ms.scrollTop=ms.scrollHeight;chatH.push({role:'user',content:q});const sys=sysP(`Document:\n---\n${docEl.innerText.trim()}\n---\nBe concise. Prefix rewrites with "Insert this:" on its own line.`);try{const reply=await callAI(chatH,sys);tp.remove();chatH.push({role:'assistant',content:reply});const am=document.createElement('div');am.className='msg ma';am.innerHTML=reply.replace(/\n\n/g,'<br><br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');ms.appendChild(am);if(reply.includes('Insert this:')){const txt=reply.split('Insert this:')[1].trim().replace(/<[^>]+>/g,'');const btn=document.createElement('button');btn.style.cssText='background:var(--gg);border:1px solid var(--gd);color:var(--gold);border-radius:4px;font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;margin-top:4px;width:100%;text-align:left';btn.textContent='↗ Insert into document';btn.onclick=()=>{const p=document.createElement('p');p.textContent=txt;docEl.appendChild(p);btn.textContent='✓ Inserted';btn.disabled=true;};ms.appendChild(btn);}}catch(err){tp.remove();const em=document.createElement('div');em.className='msg ma';em.style.color='var(--red)';em.textContent='Error: '+err.message;ms.appendChild(em);}ms.scrollTop=ms.scrollHeight;document.getElementById('aisend').disabled=false;aiiEl.focus();}


// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
buildTPG();
loadDocs();
openDoc(docs[0].id);
if(!chain.length) saveWithHash('Genesis');
</script>
